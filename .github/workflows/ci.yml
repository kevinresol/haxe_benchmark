name: CI

on:
  push:
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.haxe-version == 'nightly' }}
    strategy:
      fail-fast: false
      matrix:
        haxe-version:
          - stable
          - nightly
        target:
          - interp
          - neko
          - python
          - node
          - cs
          - cpp
          - php
          - hl
          - jvm

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Cache Haxe
        uses: actions/cache@v6
        with:
          path: ~/haxe
          key: haxe

      - name: Install Lix
        uses: lix-pm/setup-lix@master

      - name: Install Haxe
        run: lix install haxe ${{ matrix.haxe-version }}

      - name: Install Haxe Libraries
        run: lix download

      - name: Install Node Dependencies # ajv is used by SchemaWriterTest on the node target
        if: matrix.target == 'node'
        run: npm install ajv

      - name: Run Test
        run: lix run travix ${{ matrix.target }} ${{ matrix.flags }}
